<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>YouTube Video Downloader</h1>
        
        <div class="input-section">
            <input type="text" id="videoUrl" placeholder="Paste YouTube video URL here..." />
            <button id="fetchBtn" onclick="fetchFormats()">Get Video Info</button>
        </div>

        <div id="loading" class="loading hidden">Loading...</div>
        <div id="error" class="error hidden"></div>

        <div id="videoInfo" class="video-info hidden">
            <img id="thumbnail" src="" alt="Video thumbnail" />
            <h2 id="videoTitle"></h2>
            
            <div class="quality-section">
                <label for="qualitySelect">Select Quality:</label>
                <select id="qualitySelect"></select>
            </div>

            <button id="downloadBtn" onclick="downloadVideo()">Download Video</button>
        </div>

        <div id="success" class="success hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
